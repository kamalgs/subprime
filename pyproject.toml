[tool.uv.workspace]
members = ["product"]

[tool.uv]
# Override transitive pins on packages with disclosed CVEs. casparser==0.8.1
# pins pdfminer-six==20240706 exactly, which has CVE-2025-64512 and
# CVE-2025-70559 — force the patched version. casparser's pdfminer-six usage
# is API-stable across these releases so the override is safe.
override-dependencies = [
    "pdfminer-six>=20251230",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["product/tests"]
pythonpath = ["product/src"]
markers = [
    "e2e: end-to-end tests hitting real APIs (deselect with -m 'not e2e')",
    "calibration: APS/PQS judge calibration tests — make real LLM calls (run with -m calibration)",
    "smoke: live smoke tests against a deployed URL (run with -m smoke + SUBPRIME_URL env var)",
    "browser: live Playwright browser tests against a deployed URL (run with -m browser + SUBPRIME_URL)",
]
addopts = "-m 'not e2e and not calibration and not smoke and not browser'"

# Coverage is observability, not a gate — `pytest-cov` is invoked by CI
# only (see .github/workflows/test.yml). Keeping it out of `addopts` so
# local pytest runs stay fast.
[tool.coverage.run]
source = ["subprime", "apps"]
branch = true
omit = [
    "*/tests/*",
    "*/__init__.py",
    "*/migrations/*",
]
concurrency = ["thread", "greenlet"]

[tool.coverage.report]
sort = "cover"
skip_empty = true
exclude_also = [
    "raise NotImplementedError",
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "@(abc\\.)?abstractmethod",
]

# Pyright runs in CI as a soft (non-blocking) status check. The error
# count is reported on the workflow run summary; the goal is to ratchet
# down over time, not to gate PRs at the current baseline.
[tool.pyright]
include = ["product/src", "product/apps"]
exclude = [
    "**/__pycache__",
    "**/.venv",
    "product/tests",
    "product/notebooks",
    "research",
    "results",
]
pythonVersion = "3.12"
typeCheckingMode = "basic"
# These are noisy on a codebase that hasn't been type-checked before and
# don't catch real bugs at our maturity. Re-enable individually once we
# drop below ~20 errors total.
reportMissingTypeStubs = "none"
reportUnknownMemberType = "none"
reportUnknownArgumentType = "none"
reportUnknownVariableType = "none"
reportUnknownParameterType = "none"

[dependency-groups]
dev = [
    "pypdf>=6.10.2",
    "pyright>=1.1.409",
]

# ─── Mutation testing ─────────────────────────────────────────────────────────
# Run:  make mutate            # mutate focused modules, show survivors
#       uv run mutmut results  # show stats again later
# Scoped to modules with strong unit coverage — widening further produces
# false-positive survivors (lint-style mutations with no observable behaviour).
[tool.mutmut]
paths_to_mutate = [
    "product/src/subprime/core/plan_report.py",
    "product/src/subprime/observability/__init__.py",
    "product/apps/web/api_v2/_format.py",
]
tests_dir = [
    "product/tests/test_plan_report.py",
    "product/tests/test_api_v2_format.py",
    "product/tests/test_observability.py",
]
