name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly sweep for newly-disclosed CVEs in pinned deps.
    - cron: "23 4 * * 1"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Python dependency audit — CVEs in pinned libraries.
  # ──────────────────────────────────────────────────────────────
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install + pip-audit
        run: |
          uv sync --all-extras --dev
          # Install into the uv-managed venv; /usr python is externally managed.
          uv pip install pip-audit
          # --ignore-vuln-pkg is the wrong shape here; pip-audit has no direct
          # flag to skip the root package. Audit the resolved lockfile instead
          # so pip-audit never tries to query PyPI for local 'subprime'.
          uv export --no-hashes --no-emit-workspace > /tmp/requirements.txt
          uv run --directory product pip-audit \
            --requirement /tmp/requirements.txt \
            --strict --progress-spinner=off

  # ──────────────────────────────────────────────────────────────
  # Container scan — filesystem + image layers via trivy.
  # Runs on PR (image not pushed to a registry, so scan the built
  # image by docker-save → trivy image <tar>).
  # ──────────────────────────────────────────────────────────────
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v5.0.1
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: product/apps/web/frontend/package-lock.json
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install frontend deps
        run: cd product/apps/web/frontend && npm ci
      - name: Build SPA
        run: make frontend
      - name: Build image
        run: docker build -t finadvisor:ci -f product/Dockerfile .
      - name: Trivy FS scan (pyproject + lockfile)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: 'product'
          # Debian base images routinely ship HIGH CVEs for local-only DoS
          # vectors that don't fix for weeks. Block on CRITICAL only so real
          # security regressions still fail the gate.
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'finadvisor:ci'
          # Debian base images routinely ship HIGH CVEs for local-only DoS
          # vectors that don't fix for weeks. Block on CRITICAL only so real
          # security regressions still fail the gate.
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'

  # ──────────────────────────────────────────────────────────────
  # Static analysis for Python code — CodeQL picks up unsafe patterns.
  # ──────────────────────────────────────────────────────────────
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0
      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: python
      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
