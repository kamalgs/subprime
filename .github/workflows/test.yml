name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.9.1
        with:
          enable-cache: true
      - name: ruff check
        run: uv run --directory product ruff check .
      - name: ruff format (check only)
        run: uv run --directory product ruff format --check .

  unit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.9.1
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev
      - name: pytest (default suite)
        run: |
          uv run --directory product pytest \
            -m "not e2e and not calibration and not smoke and not browser" \
            --junit-xml=../junit-unit.xml \
            --tb=short
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.1.1
        if: always()
        with:
          name: junit-unit
          path: junit-unit.xml

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.9.1
        with:
          enable-cache: true
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.1
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: product/apps/web/frontend/package-lock.json
      - name: Install Python deps
        run: uv sync --all-extras --dev
      - name: Install Playwright browsers
        run: uv run --directory product playwright install --with-deps chromium
      - name: Build SPA
        run: make frontend
      - name: pytest (browser e2e)
        run: |
          uv run --directory product pytest \
            -m browser \
            --junit-xml=../junit-e2e.xml \
            --tb=short
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.1.1
        if: always()
        with:
          name: junit-e2e
          path: junit-e2e.xml

  summary:
    runs-on: ubuntu-latest
    needs: [lint, unit, frontend-e2e]
    if: always() && github.event_name == 'pull_request'
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          UNIT_RESULT: ${{ needs.unit.result }}
          E2E_RESULT: ${{ needs.frontend-e2e.result }}
        with:
          script: |
            const statuses = {
              lint: process.env.LINT_RESULT,
              unit: process.env.UNIT_RESULT,
              e2e:  process.env.E2E_RESULT,
            };
            const emoji = r => r === 'success' ? ':white_check_mark:'
                             : r === 'skipped' ? ':next_track_button:'
                             : r === 'failure' ? ':x:' : ':warning:';
            const lines = Object.entries(statuses)
              .map(([k, v]) => `${emoji(v)}  **${k}** - ${v || 'n/a'}`);
            const body = [
              '## Test status',
              '',
              ...lines,
              '',
              `_commit ${context.sha.slice(0, 7)} - run #${context.runNumber}_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Test status'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
