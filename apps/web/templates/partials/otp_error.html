<div id="otp-section" class="mt-4 space-y-3">
    <p class="text-sm text-red-600">{{ message }}</p>
    {% if show_retry %}
    <div class="flex gap-2">
        <input type="email" name="email" value="{{ email }}"
            class="flex-1 rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent">
        <button hx-post="/api/request-otp" hx-include="[name='email']" hx-target="#otp-section" hx-swap="outerHTML"
            class="px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-semibold rounded-lg transition-colors whitespace-nowrap">
            Try again</button>
    </div>
    {% endif %}
</div>
